<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Simulator 41-56</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #222; color: white; margin: 0; padding: 20px; }
        #container { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .string-lane { width: 70px; height: 220px; background: #444; border-radius: 8px; transition: background 0.1s; 
                       display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; color: #fff; border: 2px solid #555; }
        .active { background: #ffcc00; box-shadow: 0 0 25px #ffcc00; color: #000; border-color: #fff; }
        .info-panel { background: #333; padding: 15px; border-radius: 10px; display: inline-block; margin-bottom: 20px; min-width: 250px; }
        #mDisplay { font-size: 32px; color: #ffcc00; }
        .detail { color: #aaa; font-size: 18px; margin-top: 5px; }
        #startBtn { font-size: 24px; padding: 15px 40px; cursor: pointer; border-radius: 30px; border: none; background: #28a745; color: white; font-weight: bold; }
        #startBtn.playing { background: #dc3545; }
    </style>
</head>
<body>
    <h1>Cello Fingering & Sound</h1>
    
    <div class="info-panel">
        <div id="mDisplay">小節: --</div>
        <div class="detail" id="noteDisplay">音名: --</div>
        <div class="detail" id="stringDisplay">弦: -- / 指: --</div>
    </div>

    <div id="container">
        <div id="lane-3" class="string-lane"></div> <div id="lane-2" class="string-lane"></div> <div id="lane-1" class="string-lane"></div> <div id="lane-0" class="string-lane"></div> </div>

    <p style="color: #888;">(左から A線, D線, G線, C線)</p>
    <br>
    <button id="startBtn">演奏開始</button>

    <script>
        // 41小節から56小節までのデータ（一部抜粋・ループ用）
        const scoreData = [
            {"string": 2, "finger": 2, "m": 41, "note": "E3"}, {"string": 0, "finger": 4, "m": 41, "note": "E2"}, {"string": 1, "finger": 0, "m": 41, "note": "G2"},
            {"string": 2, "finger": 4, "m": 42, "note": "F#3"}, {"string": 0, "finger": 2, "m": 42, "note": "F#2"}, {"string": 3, "finger": 0, "m": 42, "note": "A3"},
            {"string": 2, "finger": 1, "m": 43, "note": "G3"}, {"string": 1, "finger": 0, "m": 43, "note": "G2"}, {"string": 3, "finger": 2, "m": 43, "note": "B3"},
            {"string": 3, "finger": 0, "m": 44, "note": "A3"}, {"string": 2, "finger": 4, "m": 44, "note": "F#3"}, {"string": 3, "finger": 3, "m": 44, "note": "C4"}
        ];

        const noteFreqs = { "E2": 82.41, "F#2": 92.50, "G2": 98.00, "A2": 110.00, "B2": 123.47, "D3": 146.83, "E3": 164.81, "F#3": 185.00, "G3": 196.00, "A3": 220.00, "B3": 246.94, "C4": 261.63 };

        let audioCtx, timer, currentIndex = 0, isPlaying = false;

        function playNote(freq) {
            if (!freq || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle'; // チェロに近い柔らかい音
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function step() {
            const data = scoreData[currentIndex];
            document.querySelectorAll('.string-lane').forEach(el => { el.classList.remove('active'); el.innerText = ""; });
            
            const activeLane = document.getElementById('lane-' + data.string);
            if (activeLane) {
                activeLane.classList.add('active');
                activeLane.innerText = data.finger;
            }
            
            document.getElementById('mDisplay').innerText = "小節: " + data.m;
            document.getElementById('noteDisplay').innerText = "音名: " + data.note;
            document.getElementById('stringDisplay').innerText = `弦: ${["C","G","D","A"][data.string]}線 / 指: ${data.finger}`;
            
            playNote(noteFreqs[data.note]);
            currentIndex = (currentIndex + 1) % scoreData.length;
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isPlaying) {
                clearInterval(timer); isPlaying = false;
                document.getElementById('startBtn').innerText = "演奏再開";
                document.getElementById('startBtn').classList.remove('playing');
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                isPlaying = true;
                document.getElementById('startBtn').innerText = "停止";
                document.getElementById('startBtn').classList.add('playing');
                timer = setInterval(step, 800);
            }
        });
    </script>
</body>
</html>
