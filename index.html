<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Fingering Player</title>
</head>
<body>
    <h2>Cello Fingering Simulator (41-56)</h2>
    <div id="measureDisplay">現在の小節: -</div>
    <script>
        // 41から56小節のデータをここに書き込んでください
        const scoreData = [
            {"string": 1, "pos": 0, "finger": 0, "label": "G", "m": 41, "note": "G2"},
            {"string": 1, "pos": 2, "finger": 1, "label": "A", "m": 41, "note": "A2"}
            // ↑ここにカンマ区切りでデータを追加します
        ];

        let currentIndex = 0;
        function updateDisplay() {
            if (scoreData[currentIndex]) {
                document.getElementById('measureDisplay').innerText = "現在の小節: " + scoreData[currentIndex].m;
            }
            currentIndex = (currentIndex + 1) % scoreData.length;
        }
        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
