<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Fingering Player</title>
</head>
<body>
    <h2>Cello Fingering Simulator (41-56)</h2>
    <div id="measureDisplay">現在の小節: -</div>
    <script>
        // 41-56小節にマッピングしたデータ
        const scoreData = [
            {"string": 2, "pos": 2, "finger": 2, "label": "D", "m": 41, "note": "E3"}, 
            {"string": 0, "pos": 4, "finger": 4, "label": "C", "m": 41, "note": "E2"}, 
            // ... (ご提示いただいた全データを貼り付けてください)
            {"string": 3, "pos": 9, "finger": 1, "label": "A", "m": 56, "note": "F#4"}
        ];

        let currentIndex = 0;
        function updateDisplay() {
            if (scoreData[currentIndex]) {
                document.getElementById('measureDisplay').innerText = "現在の小節: " + scoreData[currentIndex].m;
            }
            currentIndex = (currentIndex + 1) % scoreData.length;
        }
        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
