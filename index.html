<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Fingering Simulator</title>
</head>
<body>
    <h2>Cello Fingering Simulator</h2>
    <div id="measureDisplay">現在の小節: -</div>
    <script>
        // 41-56小節のデータをここに入れます
        const scoreData = [
            {"string": 2, "pos": 2, "finger": 2, "label": "D", "m": 41, "note": "E3"},
            {"string": 2, "pos": 5, "finger": 1, "label": "D", "m": 56, "note": "G3"}
        ];

        let currentIndex = 0;
        function updateDisplay() {
            if (scoreData[currentIndex]) {
                document.getElementById('measureDisplay').innerText = "現在の小節: " + scoreData[currentIndex].m;
            }
            currentIndex = (currentIndex + 1) % scoreData.length;
        }
        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
