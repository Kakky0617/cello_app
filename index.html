<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Fingering Player</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        canvas { background: #fff; border: 2px solid #333; margin-top: 20px; }
        .controls { margin: 20px; padding: 15px; background: white; display: inline-block; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>Cello Fingering Simulator (41-56)</h2>
    <div class="controls">
        <button id="soundToggle">🔇 音をオンにする</button>
        <button id="playBtn">再生 / 一時停止</button>
        <div style="font-size: 20px; margin-top: 10px;">現在の小節: <span id="measureNum">41</span></div>
    </div>
    <br>
    <canvas id="celloCanvas" width="800" height="250"></canvas>

    <script>
        // 練習番号B（41小節）からのデータをここに入れる
        const scoreData = [
    {"string": 1, "pos": 0, "finger": 0, "label": "G", "m": 41, "note": "G2"},
    {"string": 1, "pos": 2, "finger": 1, "label": "G", "m": 41, "note": "A2"},
    // ここに 41小節〜56小節までのすべての音データをカンマ区切りで入力してください
    // 例: {"string": 1, "pos": 4, "finger": 3, "label": "G", "m": 41, "note": "B2"},
    // ...
];

        let audioCtx = null, isSoundOn = false, isPlaying = false, currentIndex = 0;
        const canvas = document.getElementById('celloCanvas');
        const ctx = canvas.getContext('2d');

        const noteToFreq = (note) => {
            const notes = { 'C': 0, 'C#': 1, 'D': 2, 'D#': 3, 'E': 4, 'F': 5, 'F#': 6, 'G': 7, 'G#': 8, 'A': 9, 'A#': 10, 'B': 11 };
            const name = note.replace(/[0-9]/g, '');
            const octave = parseInt(note.match(/[0-9]/)[0]);
            const semitones = notes[name] + (octave - 4) * 12 + 9;
            return 440 * Math.pow(2, semitones / 12);
        };

        const playTone = (freq) => {
            if (!audioCtx || !isSoundOn) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        };

        const draw = (data) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#000'; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(40, 30); ctx.lineTo(40, 220); ctx.stroke();
            ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2;
            for(let i=0; i<4; i++) {
                ctx.beginPath(); ctx.moveTo(40, 50 + i*50); ctx.lineTo(780, 50 + i*50); ctx.stroke();
            }
            if(data) {
                const x = 40 + data.pos * 80; const y = 50 + data.string * 50;
                ctx.fillStyle = '#e91e63'; ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.fillText(data.finger, x-6, y+7);
                ctx.fillStyle = '#000'; ctx.fillText(data.note, x-15, y-30);
            }
        };

        const nextNote = () => {
            if(!isPlaying) return;
            const data = scoreData[currentIndex];
            document.getElementById('measureNum').innerText = data.m;
            draw(data);
            playTone(noteToFreq(data.note));
            currentIndex = (currentIndex + 1) % scoreData.length;
            setTimeout(nextNote, 1000);
        };

        document.getElementById('soundToggle').onclick = function() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isSoundOn = !isSoundOn;
            this.innerText = isSoundOn ? "🔊 音: ON" : "🔇 音: OFF";
        };

        document.getElementById('playBtn').onclick = () => {
            if (!isPlaying) currentIndex = 0;
            isPlaying = !isPlaying;
            if(isPlaying) nextNote();
        };

      
    </script>
</body>
</html>

        draw(scoreData[0]);
    </script>
</body>
</html>
