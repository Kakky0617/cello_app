<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Audio Test</title>
</head>
<body>
    <h2>音の再生テスト</h2>
    <button onclick="playTestSound()">音を鳴らす</button>

    <script>
        function playTestSound() {
            // Web Audio APIのコンテキストを作成
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            
            // 周波数を設定（E3 = 約164.81Hz）
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(164.81, audioCtx.currentTime);
            
            oscillator.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5); // 0.5秒で止める
        }
    </script>
</body>
</html>
