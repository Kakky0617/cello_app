<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Visualizer - Fingerboard</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #222; color: white; margin: 0; }
        .info-panel { background: #333; padding: 10px; margin-bottom: 10px; }
        #mDisplay { font-size: 24px; color: #ffcc00; font-weight: bold; }
        
        /* 指板のデザイン */
        #fingerboard { 
            position: relative; width: 300px; height: 500px; 
            background: #3d2b1f; margin: 20px auto; border-radius: 10px;
            border-left: 10px solid #222; border-right: 10px solid #222;
        }
        /* 弦（4本） */
        .string { 
            position: absolute; width: 2px; height: 100%; background: #aaa; top: 0; 
        }
        /* 指の位置（光る丸） */
        .finger-marker { 
            position: absolute; width: 40px; height: 40px; background: #ff4444; 
            border-radius: 50%; display: none; transform: translate(-50%, -50%);
            align-items: center; justify-content: center; font-size: 24px; 
            font-weight: bold; color: white; box-shadow: 0 0 15px #ff4444;
        }
        #startBtn { font-size: 20px; padding: 10px 30px; cursor: pointer; border-radius: 20px; background: #28a745; color: white; }
    </style>
</head>
<body>
    <div class="info-panel">
        <div id="mDisplay">小節: --</div>
        <div id="noteInfo">音名: -- (弦: -- / 指: --)</div>
    </div>

    <div id="fingerboard">
        <div class="string" style="left: 20%;"></div> <div class="string" style="left: 40%;"></div> <div class="string" style="left: 60%;"></div> <div class="string" style="left: 80%;"></div> <div id="marker" class="finger-marker"></div>
    </div>

    <button id="startBtn">演奏開始</button>

    <script>
        // posは「ナットからの距離（高さ）」として使用
        const scoreData = [
            {"string": 2, "pos": 100, "finger": 2, "m": 41, "note": "E3"},
            {"string": 0, "pos": 250, "finger": 4, "m": 41, "note": "E2"},
            {"string": 1, "pos": 50, "finger": 0, "m": 41, "note": "G2"},
            {"string": 2, "pos": 200, "finger": 4, "m": 42, "note": "F#3"}
        ];

        const noteFreqs = { "E2": 82.41, "G2": 98.00, "E3": 164.81, "F#3": 185.00 };

        let audioCtx, timer, currentIndex = 0, isPlaying = false;

        function playNote(freq) {
            if (!freq || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        }

        function step() {
            const data = scoreData[currentIndex];
            const marker = document.getElementById('marker');
            
            // ポジション表示の更新
            marker.style.display = "flex";
            // 弦の横位置 (C=20%, G=40%, D=60%, A=80%)
            marker.style.left = (20 + (data.string * 20)) + "%";
            // 高さ位置 (posデータを使用)
            marker.style.top = data.pos + "px";
            marker.innerText = data.finger;

            document.getElementById('mDisplay').innerText = "小節: " + data.m;
            document.getElementById('noteInfo').innerText = `音名: ${data.note} (${["C","G","D","A"][data.string]}線 / 指: ${data.finger})`;

            playNote(noteFreqs[data.note]);
            currentIndex = (currentIndex + 1) % scoreData.length;
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isPlaying) {
                clearInterval(timer); isPlaying = false;
                document.getElementById('startBtn').innerText = "演奏再開";
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                isPlaying = true;
                document.getElementById('startBtn').innerText = "停止";
                timer = setInterval(step, 1000);
            }
        });
    </script>
</body>
</html>
