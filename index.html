<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Trainer - Fixed</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #222; color: white; margin: 0; padding: 10px; }
        .control-panel { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: inline-block; }
        input { width: 60px; padding: 5px; text-align: center; background: #222; color: #fff; border: 1px solid #555; }
        #mDisplay { font-size: 32px; color: #ffcc00; font-weight: bold; }
        #fb-container { position: relative; width: 320px; margin: 10px auto; }
        #fingerboard { position: relative; width: 300px; height: 600px; background: #3d2b1f; margin: 0 auto; border-radius: 8px; border: 5px solid #1a110a; overflow: hidden; }
        .string { position: absolute; width: 2px; height: 100%; background: #ccc; top: 0; }
        .finger-marker { 
            position: absolute; width: 46px; height: 46px; background: #ffcc00; 
            border-radius: 50%; display: none; transform: translate(-50%, -50%);
            align-items: center; justify-content: center; font-size: 24px; 
            font-weight: bold; color: #000; z-index: 10;
        }
        .finger-marker.ext-mode { border: 4px double #fff; background: #ffaa00; }
        .finger-marker.thumb-mode { border: 4px solid #fff; background: #00ffcc; }
        #startBtn { font-size: 20px; padding: 10px 40px; border-radius: 20px; cursor: pointer; background: #28a745; color: white; border: none; }
    </style>
</head>
<body>
    <div class="control-panel">
        範囲: <input type="number" id="startM" value="41"> 〜 <input type="number" id="endM" value="56">
        速度: <input type="number" id="bpm" value="80">
        <div id="mDisplay">小節: --</div>
        <div id="noteInfo">音名: --</div>
    </div>
    <div id="fb-container">
        <div id="fingerboard">
            <div class="string" style="left: 12.5%;"></div><div class="string" style="left: 37.5%;"></div>
            <div class="string" style="left: 62.5%;"></div><div class="string" style="left: 87.5%;"></div>
            <div id="marker" class="finger-marker"></div>
        </div>
    </div>
    <button id="startBtn">演奏開始</button>

    <script>
        const scoreData = [
            {"string": 2, "pos": 100, "finger": 2, "m": 41, "note": "E3"},
            {"string": 0, "pos": 200, "finger": 4, "m": 41, "note": "E2"},
            {"string": 1, "pos": 40, "finger": 0, "m": 41, "note": "G2"},
            {"string": 1, "pos": 120, "finger": 4, "m": 41, "note": "B2", "form": "ext"},
            {"string": 3, "pos": 420, "finger": 0, "m": 54, "note": "F#4", "form": "thumb"}
        ]; // ※テスト用に絞っています。動いたらデータを増やしましょう。

        const noteFreqs = { "E2": 82.41, "G2": 98.0, "B2": 123.47, "E3": 164.81, "F#4": 369.99 };
        let audioCtx, timer, currentIndex = 0, isPlaying = false;

        function playNote(freq) {
            if (!freq || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function step() {
            const data = scoreData[currentIndex];
            const marker = document.getElementById('marker');
            marker.style.display = "flex";
            marker.style.left = (12.5 + (data.string * 25)) + "%";
            marker.style.top = data.pos + "px";
            
            let fingerVal = data.finger;
            marker.classList.remove('thumb-mode', 'ext-mode');
            
            if (data.finger === 0) {
                if (data.pos >= 360 || data.form === "thumb") {
                    fingerVal = "Q"; marker.classList.add('thumb-mode');
                } else { fingerVal = "0"; }
            } else if (data.form === "ext") {
                marker.classList.add('ext-mode'); fingerVal += " ↔";
            }
            marker.innerText = fingerVal;
            document.getElementById('mDisplay').innerText = "小節: " + data.m;
            if (noteFreqs[data.note]) playNote(noteFreqs[data.note]);

            const startM = parseInt(document.getElementById('startM').value);
            currentIndex = (currentIndex + 1) % scoreData.length;
        }

        function updateTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(step, 60000 / (parseInt(document.getElementById('bpm').value) || 80));
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isPlaying) {
                clearInterval(timer); isPlaying = false;
                document.getElementById('startBtn').innerText = "再開";
            } else {
                isPlaying = true;
                document.getElementById('startBtn').innerText = "停止";
                updateTimer();
            }
        });
    </script>
</body>
</html>
