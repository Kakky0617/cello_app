            {"string": 2, "pos": 2, "finger": 2, "label": "D", "m": 56, "note": "E3"}, {"string": 1, "pos": 0, "finger": 0, "label": "G", "m": 56, "note": "G2"}, {"string": 1, "pos": 4, "finger": 4, "label": "G", "m": 56, "note": "B2"}, {"string": 2, "pos": 4, "finger": 4, "label": "D", "m": 56, "note": "F#3"}, {"string": 2, "pos": 2, "finger": 2, "label": "D", "m": 56, "note": "E3"}

        // 2. 音階と周波数の対応表
        const noteFreqs = {
            "E2": 82.41, "F2": 87.31, "F#2": 92.50, "G2": 98.00, "G#2": 103.83, "A2": 110.00, "A#2": 116.54, "B2": 123.47,
            "C3": 130.81, "C#3": 138.59, "D3": 146.83, "D#3": 155.56, "E-3": 155.56, "E3": 164.81, "F3": 174.61, "F#3": 185.00, "G3": 196.00, "G#3": 207.65, "A3": 220.00, "A#3": 233.08, "B3": 246.94,
            "C4": 261.63, "C#4": 277.18, "D4": 293.66, "D#4": 311.13, "E4": 329.63, "F4": 349.23, "F#4": 369.99, "G4": 392.00
        };

        let audioCtx;
        let currentIndex = 0;
        let isPlaying = false;
        let timer;

        function playNote(freq) {
            if (!freq) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth'; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.8);
        }

        function step() {
            const data = scoreData[currentIndex];
            
            // 画面更新
            document.getElementById('mDisplay').innerText = "小節: " + data.m;
            document.getElementById('noteDisplay').innerText = "音名: " + data.note;
            document.getElementById('stringDisplay').innerText = `弦: ${data.string} / 指: ${data.finger}`;
            
            // 音を鳴らす
            playNote(noteFreqs[data.note]);

            // 次へ
            currentIndex = (currentIndex + 1) % scoreData.length;
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            if (isPlaying) {
                clearInterval(timer);
                isPlaying = false;
                document.getElementById('startBtn').innerText = "演奏再開";
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                isPlaying = true;
                document.getElementById('startBtn').innerText = "停止";
                timer = setInterval(step, 800); // 0.8秒ごとに進む（テンポ調整可）
            }
        });
    </script>
