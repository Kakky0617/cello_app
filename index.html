<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Fingering Player</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding-top: 20px; }
        canvas { background: #fff; border: 1px solid #ccc; max-width: 100%; height: auto; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { margin: 20px; padding: 15px; background: white; display: inline-block; border-radius: 10px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 5px; border: 1px solid #999; margin: 0 5px; transition: 0.3s; }
        #soundToggle { background: #ffeb3b; font-weight: bold; }
        #soundToggle.on { background: #4caf50; color: white; }
        #playBtn { background: #2196f3; color: white; border: none; }
        #playBtn:hover { background: #1976d2; }
        .info-panel { font-size: 18px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Cello Fingering Simulator (Audio)</h2>
    
    <div class="controls">
        <button id="soundToggle">🔇 音をオンにする</button>
        <button id="playBtn">再生 / 一時停止</button>
        <div class="info-panel">現在の小節: <span id="measureNum">1</span></div>
    </div>

    <br>
    <canvas id="celloCanvas" width="800" height="200"></canvas>

    <script>
        // --- ブラームス 第4番 第4楽章 練習番号B付近のデータ ---
        const scoreData = [
            {"string": 0, "pos": 7, "finger": 4, "label": "C", "m": 33, "note": "G2"},
            {"string": 1, "pos": 2, "finger": 1, "label": "G", "m": 33, "note": "A2"},
            {"string": 1, "pos": 4, "finger": 3, "label": "G", "m": 33, "note": "B2"},
            {"string": 1, "pos": 5, "finger": 4, "label": "G", "m": 34, "note": "C3"},
            {"string": 2, "pos": 2, "finger": 1, "label": "D", "m": 34, "note": "E3"},
            {"string": 2, "pos": 4, "finger": 3, "label": "D", "m": 34, "note": "F#3"},
            {"string": 2, "pos": 5, "finger": 4, "label": "D", "m": 35, "note": "G3"},
            {"string": 2, "pos": 4, "finger": 3, "label": "D", "m": 35, "note": "F#3"},
            {"string": 2, "pos": 2, "finger": 1, "label": "D", "m": 35, "note": "E3"},
            {"string": 2, "pos": 0, "finger": 0, "label": "D", "m": 36, "note": "D3"},
            {"string": 1, "pos": 4, "finger": 3, "label": "G", "m": 36, "note": "B2"},
            {"string": 1, "pos": 2, "finger": 1, "label": "G", "m": 36, "note": "A2"},
            {"string": 1, "pos": 0, "finger": 0, "label": "G", "m": 37, "note": "G2"},
            {"string": 0, "pos": 7, "finger": 4, "label": "C", "m": 37, "note": "G2"},
            {"string": 1, "pos": 0, "finger": 0, "label": "G", "m": 38, "note": "G2"},
            {"string": 1, "pos": 2, "finger": 1, "label": "G", "m": 38, "note": "A2"},
            {"string": 1, "pos": 4, "finger": 3, "label": "G", "m": 39, "note": "B2"},
            {"string": 2, "pos": 0, "finger": 0, "label": "D", "m": 39, "note": "D3"},
            {"string": 2, "pos": 2, "finger": 1, "label": "D", "m": 40, "note": "E3"}
        ];

        let audioCtx = null;
        let isSoundOn = false;

        const noteToFreq = (note) => {
            const notes = { 'C': 0, 'C#': 1, 'D-': 1, 'D': 2, 'D#': 3, 'E-': 3, 'E': 4, 'F': 5, 'F#': 6, 'G-': 6, 'G': 7, 'G#': 8, 'A-': 8, 'A': 9, 'A#': 10, 'B-': 10, 'B': 11 };
            const name = note.replace(/[0-9]/g, '');
            const octave = parseInt(note.match(/[0-9]/)[0]);
            const semitones = notes[name] + (octave - 4) * 12 + 9;
            return 440 * Math.pow(2, semitones / 12);
        };

        const playTone = (freq) => {
            if (!audioCtx || !isSoundOn) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.8);
        };

        const canvas = document.getElementById('celloCanvas');
        const ctx = canvas.getContext('2d');
        let currentIndex = 0;
        let isPlaying = false;

        const draw = (data) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#333';
            for(let i=0; i<4; i++) {
                ctx.lineWidth = 1 + i; 
                ctx.beginPath();
                ctx.moveTo(50, 40 + i*40);
                ctx.lineTo(750, 40 + i*40);
                ctx.stroke();
            }
            if(data) {
                const x = 50 + data.pos * 40;
                const y = 40 + data.string * 40;
                ctx.fillStyle = '#e91e63';
                ctx.beginPath();
                ctx.arc(x, y, 16, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px sans-serif';
                ctx.fillText(data.finger, x-5, y+6);
                ctx.fillStyle = 'black';
                ctx.fillText(data.note, x-10, y-22);
                document.getElementById('measureNum').innerText = data.m;
            }
        };

       // --- 修正版：小節番号をデータから直接読み取る ---
const nextNote = () => {
    if(!isPlaying) return;
    const data = scoreData[currentIndex];
    
    // 小節表示をデータの内容に合わせて更新
    document.getElementById('measureNum').innerText = data.m;
    
    draw(data);
    playTone(noteToFreq(data.note));
    
    currentIndex = (currentIndex + 1) % scoreData.length;
    setTimeout(nextNote, 1000); 
};

        document.getElementById('soundToggle').onclick = function() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isSoundOn = !isSoundOn;
            this.innerText = isSoundOn ? "🔊 音: ON" : "🔇 音: OFF";
            this.className = isSoundOn ? "on" : "";
        };

       document.getElementById('playBtn').onclick = () => {
    if (!isPlaying) {
        currentIndex = 0; // 再生開始時に必ず最初からにする
    }
    isPlaying = !isPlaying;
    if(isPlaying) nextNote();
};

        draw(scoreData[0]);
    </script>
</body>
</html>
