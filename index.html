<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Test Player</title>
</head>
<body>
    <h2 id="status">テスト中...</h2>
    <script>
        // 最小限のテストデータ
        const scoreData = [
            {"m": 41}, {"m": 42}, {"m": 43}
        ];
        let i = 0;
        setInterval(() => {
            document.getElementById('status').innerText = "現在の小節: " + scoreData[i].m;
            i = (i + 1) % scoreData.length;
        }, 1000);
    </script>
</body>
</html>
