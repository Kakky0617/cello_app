<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Fingerboard Visualizer</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #222; color: white; margin: 0; padding: 10px; }
        .info-panel { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: inline-block; min-width: 300px; }
        #mDisplay { font-size: 28px; color: #ffcc00; font-weight: bold; }

        /* 指板全体のコンテナ */
        #fb-container { position: relative; width: 320px; margin: 20px auto; }
        
        /* 弦の名前（固定表示） */
        .string-labels { display: flex; justify-content: space-around; padding: 0 10px; margin-bottom: 5px; font-weight: bold; color: #aaa; }

        /* 指板 */
        #fingerboard { 
            position: relative; width: 300px; height: 600px; 
            background: #3d2b1f; margin: 0 auto; border-radius: 5px;
            border: 4px solid #1a110a; overflow: hidden;
        }

        /* ポジション・ゾーンの色分け */
        .zone { position: absolute; width: 100%; left: 0; opacity: 0.15; }
        .zone-1 { top: 0; height: 150px; background-color: #44ff44; } /* 第1ポジション付近: 緑 */
        .zone-2 { top: 150px; height: 150px; background-color: #4444ff; } /* 第2-3ポジション付近: 青 */
        .zone-3 { top: 300px; height: 300px; background-color: #ff4444; } /* ハイポジション: 赤 */

        /* フレット（横線） */
        .fret { position: absolute; width: 100%; height: 1px; background: rgba(255,255,255,0.3); left: 0; }

        /* 弦（縦線） */
        .string { position: absolute; width: 2px; height: 100%; background: #ccc; top: 0; box-shadow: 1px 0 2px #000; }

        /* 指マーカー */
        .finger-marker { 
            position: absolute; width: 44px; height: 44px; background: #ffcc00; 
            border-radius: 50%; display: none; transform: translate(-50%, -50%);
            align-items: center; justify-content: center; font-size: 26px; 
            font-weight: bold; color: #000; box-shadow: 0 0 20px #ffcc00; z-index: 10;
        }

        #startBtn { font-size: 22px; padding: 12px 40px; cursor: pointer; border-radius: 30px; background: #28a745; color: white; border: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="info-panel">
        <div id="mDisplay">小節: --</div>
        <div id="noteInfo">音名: -- (指: --)</div>
    </div>

    <div id="fb-container">
        <div class="string-labels"><span>C</span><span>G</span><span>D</span><span>A</span></div>
        <div id="fingerboard">
            <div class="zone zone-1"></div>
            <div class="zone zone-2"></div>
            <div class="zone zone-3"></div>

            <div class="fret" style="top: 50px;"></div>
            <div class="fret" style="top: 100px;"></div>
            <div class="fret" style="top: 150px;"></div>
            <div class="fret" style="top: 200px;"></div>
            <div class="fret" style="top: 250px;"></div>
            <div class="fret" style="top: 300px;"></div>
            <div class="fret" style="top: 350px;"></div>
            <div class="fret" style="top: 400px;"></div>

            <div class="string" style="left: 12.5%;"></div>
            <div class="string" style="left: 37.5%;"></div>
            <div class="string" style="left: 62.5%;"></div>
            <div class="string" style="left: 87.5%;"></div>
            
            <div id="marker" class="finger-marker"></div>
        </div>
    </div>

    <button id="startBtn">演奏開始</button>

    <script>
        // 41-44小節のデータ（繰り返しを修正）
        const scoreData = [
            {"string": 2, "pos": 100, "finger": 2, "m": 41, "note": "E3"},
            {"string": 0, "pos": 200, "finger": 4, "m": 41, "note": "E2"},
            {"string": 1, "pos": 50, "finger": 0, "m": 41, "note": "G2"},
            {"string": 2, "pos": 150, "finger": 4, "m": 42, "note": "F#3"},
            {"string": 0, "pos": 250, "finger": 2, "m": 42, "note": "F#2"},
            {"string": 3, "pos": 50, "finger": 0, "m": 42, "note": "A3"},
            {"string": 2, "pos": 180, "finger": 1, "m": 43, "note": "G3"},
            {"string": 1, "pos": 50, "finger": 0, "m": 43, "note": "G2"},
            {"string": 3, "finger": 0, "m": 44, "note": "A3", "pos": 50}
        ];

        const noteFreqs = { "E2": 82.41, "F#2": 92.50, "G2": 98.00, "E3": 164.81, "F#3": 185.00, "G3": 196.00, "A3": 220.00 };

        let audioCtx, timer, currentIndex = 0, isPlaying = false;

        function playNote(freq) {
            if (!freq || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        }

        function step() {
            const data = scoreData[currentIndex];
            const marker = document.getElementById('marker');
            
            marker.style.display = "flex";
            // 弦の位置 (左から C, G, D, A)
            marker.style.left = (12.5 + (data.string * 25)) + "%";
            marker.style.top = data.pos + "px";
            marker.innerText = data.finger;

            document.getElementById('mDisplay').innerText = "小節: " + data.m;
            document.getElementById('noteInfo').innerText = `音名: ${data.note} (指: ${data.finger})`;

            if (noteFreqs[data.note]) playNote(noteFreqs[data.note]);
            currentIndex = (currentIndex + 1) % scoreData.length;
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isPlaying) {
                clearInterval(timer); isPlaying = false;
                document.getElementById('startBtn').innerText = "演奏再開";
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                isPlaying = true;
                document.getElementById('startBtn').innerText = "停止";
                timer = setInterval(step, 1200); // 少しゆっくりめに設定
            }
        });
    </script>
</body>
</html>
