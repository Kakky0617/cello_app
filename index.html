<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cello Fingering Player</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        canvas { background: #fff; border: 2px solid #333; margin-top: 20px; }
        .controls { margin: 20px; padding: 15px; background: white; display: inline-block; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>Cello Fingering Simulator</h2>
    <div class="controls">
        <button id="soundToggle">🔇 音をオンにする</button>
        <button id="playBtn">再生 / 一時停止</button>
        <div>現在の小節: <span id="measureNum">33</span></div>
    </div>
    <br>
    <canvas id="celloCanvas" width="800" height="250"></canvas>

    <script>
        const scoreData = [
            {"string": 0, "pos": 7, "finger": 4, "label": "C", "m": 33, "note": "G2"},
            {"string": 1, "pos": 2, "finger": 1, "label": "G", "m": 33, "note": "A2"},
            {"string": 1, "pos": 4, "finger": 3, "label": "G", "m": 33, "note": "B2"},
            {"string": 1, "pos": 5, "finger": 4, "label": "G", "m": 34, "note": "C3"},
            {"string": 2, "pos": 2, "finger": 1, "label": "D", "m": 34, "note": "E3"},
            {"string": 2, "pos": 4, "finger": 3, "label": "D", "m": 34, "note": "F#3"},
            {"string": 2, "pos": 5, "finger": 4, "label": "D", "m": 35, "note": "G3"},
            {"string": 2, "pos": 4, "finger": 3, "label": "D", "m": 35, "note": "F#3"},
            {"string": 2, "pos": 2, "finger": 1, "label": "D", "m": 35, "note": "E3"},
            {"string": 2, "pos": 0, "finger": 0, "label": "D", "m": 36, "note": "D3"},
            {"string": 1, "pos": 4, "finger": 3, "label": "G", "m": 36, "note": "B2"},
            {"string": 1, "pos": 2, "finger": 1, "label": "G", "m": 36, "note": "A2"},
            {"string": 1, "pos": 0, "finger": 0, "label": "G", "m": 37, "note": "G2"},
            {"string": 0, "pos": 7, "finger": 4, "label": "C", "m": 37, "note": "G2"},
            {"string": 1, "pos": 0, "finger": 0, "label": "G", "m": 38, "note": "G2"},
            {"string": 1, "pos": 2, "finger": 1, "label": "G", "m": 38, "note": "A2"},
            {"string": 1, "pos": 4, "finger": 3, "label": "G", "m": 39, "note": "B2"},
            {"string": 2, "pos": 0, "finger": 0, "label": "D", "m": 39, "note": "D3"},
            {"string": 2, "pos": 2, "finger": 1, "label": "D", "m": 40, "note": "E3"}
        ];

        let audioCtx = null, isSoundOn = false, isPlaying = false, currentIndex = 0;
        const canvas = document.getElementById('celloCanvas');
        const ctx = canvas.getContext('2d');

        const draw = (data) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 1. 指板の端（ナット）を描画
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(40, 30); ctx.lineTo(40, 220); ctx.stroke();

            // 2. 弦を描画
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 2;
            for(let i=0; i<4; i++) {
                ctx.beginPath(); ctx.moveTo(40, 50 + i*50); ctx.lineTo(780, 50 + i*50); ctx.stroke();
                ctx.fillStyle = '#000'; ctx.fillText(['C','G','D','A'][i], 10, 55 + i*50);
            }

            // 3. 現在の指位置を描画
            if(data) {
                const x = 40 + data.pos * 80; // ポジションを広げる
                const y = 50 + data.string * 50;
                // 補助線
                ctx.strokeStyle = '#ff000033'; ctx.beginPath(); ctx.moveTo(x, 30); ctx.lineTo(x, 220); ctx.stroke();
                // 指丸
                ctx.fillStyle = '#e91e63'; ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = 'bold 20px Arial'; ctx.fillText(data.finger, x-6, y+7);
                ctx.fillStyle = '#000'; ctx.fillText(data.note, x-15, y-30);
            }
        };

        // (中略: noteToFreq, playToneはそのまま)
        // (nextNote, clickイベントもそのまま)
    </script>
</body>
</html>
